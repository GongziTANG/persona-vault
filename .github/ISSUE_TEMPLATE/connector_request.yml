name: Connector request
description: Request a public content source for PersonaVault
title: "[Connector] "
labels: [connector]
body:
  - type: markdown
    attributes:
      value: Thanks for helping prioritize the next source. Never include credentials or private content.
  - type: input
    id: platform
    attributes:
      label: Platform or source
      placeholder: YouTube, podcast RSS, blog, newsletter...
    validations:
      required: true
  - type: textarea
    id: job
    attributes:
      label: What are you trying to preserve or study?
      description: Describe the user outcome, not only the API.
    validations:
      required: true
  - type: textarea
    id: completeness
    attributes:
      label: What would make the archive trustworthy?
      description: Mention IDs, dates, media, comments, unavailable states, or incremental behavior that matter.
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I did not include credentials, private content, personal data, or local paths.
          required: true
