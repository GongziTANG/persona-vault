name: Bug report
description: Report a reproducible PersonaVault problem using sanitized data
title: "[Bug] "
labels: [bug]
body:
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Sanitized reproduction
      description: Use fictional IDs and text. Never paste sessions, private archives, credentials, or local paths.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: PersonaVault version
      placeholder: 0.1.0
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I did not include credentials, private content, personal data, or local paths.
          required: true
